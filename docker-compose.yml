services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-analyst-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - ai-analyst-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-analyst-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-analyst-net

networks:
  ai-analyst-net:
    driver: bridge
