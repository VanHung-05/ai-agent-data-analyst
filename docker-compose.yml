version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ai-analyst-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - ai-analyst-net

  frontend:
    build: ./frontend
    container_name: ai-analyst-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000/api/v1
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ai-analyst-net

networks:
  ai-analyst-net:
    driver: bridge
